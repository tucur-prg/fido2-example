<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
     content="width=320,
        height=480,
        initial-scale=1.0,
        minimum-scale=1.0,
        maximum-scale=2.0,
        user-scalable=yes" />

  <title>Passkeys</title>
</head>

<body>

<form method="GET" onsubmit="return false;">
  <input type="text" name="username" autocomplete="username webauthn">
  <input type="button" name="click" value="click" onclick="signin()">
</form>

</body>

<script>
function signIn() {
  console.log("sign in")
  if (!PublicKeyCredential.isConditionalMediationAvailable ||
    !PublicKeyCredential.isConditionalMediationAvailable()) {
      console.log("not mediation");
      return false;
  }

  navigator.credential.get({
    "publicKey": {
      challenge: "abcdefghijklmnopqrstuvwxyz"
    },
    mediation: "conditional"
  })
  .then(console.log);
}
</script>

</html>
